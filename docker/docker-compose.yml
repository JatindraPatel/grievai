version: "3.9"

services:
  backend:
    build: ./backend
    container_name: grievai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    restart: unless-stopped

  # Optional: serve frontend via nginx
  # frontend:
